<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Jobs Aggregator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }

    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 20px; color: #f0f6fc; }
    header h1 span { color: #58a6ff; }

    .actions { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px; transition: 0.15s; }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn.primary { background: #238636; border-color: #238636; color: #fff; }
    .btn.primary:hover { background: #2ea043; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px; }

    .tabs { display: flex; gap: 0; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 14px; transition: 0.15s; }
    .tab:hover { color: #c9d1d9; }
    .tab.active { color: #f0f6fc; border-bottom-color: #f78166; }

    .status-bar { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #8b949e; display: none; }
    .status-bar.visible { display: block; }
    .status-bar.success { border-color: #238636; color: #3fb950; }
    .status-bar.error { border-color: #da3633; color: #f85149; }

    .date-group { margin-bottom: 24px; }
    .date-header { font-size: 14px; color: #8b949e; padding: 8px 0; border-bottom: 1px solid #21262d; margin-bottom: 8px; }
    .date-header .count { background: #30363d; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 8px; }

    .job-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 14px 16px; margin-bottom: 8px; transition: 0.15s; }
    .job-card:hover { border-color: #58a6ff; }
    .job-title { font-size: 15px; color: #58a6ff; text-decoration: none; font-weight: 500; }
    .job-title:hover { text-decoration: underline; }
    .job-meta { margin-top: 6px; font-size: 12px; color: #8b949e; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .job-repo { color: #8b949e; }
    .label { display: inline-block; padding: 1px 7px; border-radius: 12px; font-size: 11px; border: 1px solid #30363d; color: #c9d1d9; background: #21262d; }

    .repo-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
    .repo-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 14px 16px; }
    .repo-card a { color: #58a6ff; text-decoration: none; font-size: 14px; font-weight: 500; }
    .repo-card a:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 60px 20px; color: #484f58; }
    .empty p { font-size: 15px; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #panel-repos, #panel-jobs, #panel-profile { display: none; }
    #panel-jobs.active, #panel-repos.active, #panel-profile.active { display: block; }

    /* Apply button on job card */
    .job-actions { margin-top: 10px; display: flex; gap: 8px; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 5px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; transition: 0.15s; }
    .btn-sm:hover { background: #30363d; border-color: #8b949e; }
    .btn-sm.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .btn-sm.primary:hover { background: #388bfd; }
    .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Apply panel */
    .apply-panel { margin-top: 12px; padding: 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; }
    .apply-panel.hidden { display: none; }
    .apply-panel .loading { color: #8b949e; font-size: 13px; }
    .apply-panel textarea { width: 100%; min-height: 200px; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: inherit; font-size: 13px; resize: vertical; }
    .apply-panel textarea:focus { outline: none; border-color: #58a6ff; }
    .apply-info { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
    .apply-info strong { color: #c9d1d9; }
    .apply-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .apply-error { color: #f85149; font-size: 13px; padding: 8px 0; }

    /* Profile form */
    .profile-form { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 24px; max-width: 480px; }
    .profile-form label { display: block; margin-bottom: 6px; font-size: 13px; color: #8b949e; }
    .profile-form input[type="text"], .profile-form input[type="email"] { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; font-family: inherit; }
    .profile-form input[type="text"]:focus, .profile-form input[type="email"]:focus { outline: none; border-color: #58a6ff; }
    .profile-form .field { margin-bottom: 16px; }
    .profile-form input[type="file"] { color: #8b949e; font-size: 13px; }
    .profile-form .hint { font-size: 12px; color: #484f58; margin-top: 4px; }
    .profile-form .form-actions { display: flex; gap: 8px; margin-top: 20px; }
    .profile-current { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px 20px; margin-bottom: 16px; }
    .profile-current .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .profile-current .row .label-text { color: #8b949e; }
    .profile-current .row .value { color: #c9d1d9; }
    .profile-current .cv-yes { color: #3fb950; }
    .profile-current .cv-no { color: #f85149; }
  </style>
</head>
<body>
  <header>
    <h1><span>&#9679;</span> GitHub Jobs Aggregator</h1>
    <div class="actions">
      <button class="btn primary" id="btn-trigger">Fetch Jobs</button>
      <button class="btn" id="btn-discover">Discover Repos</button>
    </div>
  </header>

  <div class="container">
    <div class="status-bar" id="status"></div>

    <div class="tabs">
      <div class="tab active" data-panel="jobs">Jobs</div>
      <div class="tab" data-panel="repos">Repos</div>
      <div class="tab" data-panel="profile">Profile</div>
    </div>

    <div id="panel-jobs" class="active"></div>
    <div id="panel-repos"></div>
    <div id="panel-profile"></div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const status = $('#status');

    function showStatus(msg, type = '') {
      status.textContent = msg;
      status.className = 'status-bar visible' + (type ? ' ' + type : '');
    }
    function hideStatus() { status.className = 'status-bar'; }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('#panel-jobs, #panel-repos, #panel-profile').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        $(`#panel-${tab.dataset.panel}`).classList.add('active');
        if (tab.dataset.panel === 'profile') loadProfile();
      });
    });

    // Load jobs
    async function loadJobs() {
      const panel = $('#panel-jobs');
      try {
        const res = await fetch('/jobs');
        const data = await res.json();
        const dates = Object.keys(data);

        if (dates.length === 0) {
          panel.innerHTML = '<div class="empty"><p>No jobs yet. Click "Fetch Jobs" to get started.</p></div>';
          return;
        }

        let html = '';
        for (const date of dates) {
          const jobs = data[date];
          html += `<div class="date-group">
            <div class="date-header">${formatDate(date)}<span class="count">${jobs.length}</span></div>`;
          for (const job of jobs) {
            const labels = job.labels.map(l => `<span class="label">${esc(l)}</span>`).join(' ');
            const jobId = 'job-' + btoa(job.url).replace(/[^a-zA-Z0-9]/g, '').slice(0, 16);
            html += `<div class="job-card" data-job-id="${jobId}" data-job-url="${esc(job.url)}">
              <a class="job-title" href="${esc(job.url)}" target="_blank">${esc(job.title)}</a>
              <div class="job-meta">
                <span class="job-repo">${esc(job.repo)}</span>
                ${labels}
              </div>
              <div class="job-actions">
                <button class="btn-sm primary btn-apply" data-job-id="${jobId}">Apply</button>
              </div>
              <div class="apply-panel hidden" id="apply-${jobId}"></div>
            </div>`;
          }
          html += '</div>';
        }
        panel.innerHTML = html;
      } catch (e) {
        panel.innerHTML = '<div class="empty"><p>Failed to load jobs.</p></div>';
      }
    }

    // Load repos
    async function loadRepos() {
      const panel = $('#panel-repos');
      try {
        const res = await fetch('/repos');
        const repos = await res.json();
        let html = '<div class="repo-list">';
        for (const r of repos) {
          html += `<div class="repo-card"><a href="https://github.com/${esc(r.owner)}/${esc(r.repo)}" target="_blank">${esc(r.owner)}/${esc(r.repo)}</a></div>`;
        }
        html += '</div>';
        panel.innerHTML = html;
      } catch (e) {
        panel.innerHTML = '<div class="empty"><p>Failed to load repos.</p></div>';
      }
    }

    // Trigger fetch
    $('#btn-trigger').addEventListener('click', async () => {
      const btn = $('#btn-trigger');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Fetching...';
      showStatus('Running aggregation...');
      try {
        const res = await fetch('/jobs/trigger', { method: 'POST' });
        const data = await res.json();
        if (data.status === 'ok') {
          showStatus(`Fetched ${data.jobsFetched} jobs at ${new Date(data.ranAt).toLocaleTimeString()}`, 'success');
          loadJobs();
        } else {
          showStatus(`Error: ${data.error}`, 'error');
        }
      } catch (e) {
        showStatus('Request failed.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Fetch Jobs';
    });

    // Discover repos
    $('#btn-discover').addEventListener('click', async () => {
      const btn = $('#btn-discover');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Discovering...';
      showStatus('Searching for new repos via Claude...');
      try {
        const res = await fetch('/repos/discover', { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          showStatus(`Error: ${data.error}`, 'error');
        } else {
          const msg = data.added.length > 0
            ? `Found ${data.added.length} new repos: ${data.added.join(', ')} (${data.total} total)`
            : `No new repos found (${data.total} total)`;
          showStatus(msg, 'success');
          loadRepos();
        }
      } catch (e) {
        showStatus('Request failed.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Discover Repos';
    });

    // ===== Profile =====
    async function loadProfile() {
      const panel = $('#panel-profile');
      try {
        const res = await fetch('/profile');
        if (res.status === 404) {
          renderProfileForm(null);
          return;
        }
        const data = await res.json();
        renderProfileForm(data);
      } catch (e) {
        renderProfileForm(null);
      }
    }

    function renderProfileForm(profile) {
      const panel = $('#panel-profile');
      const current = profile ? `
        <div class="profile-current">
          <div class="row"><span class="label-text">Name</span><span class="value">${esc(profile.name)}</span></div>
          <div class="row"><span class="label-text">Email</span><span class="value">${esc(profile.email)}</span></div>
          <div class="row"><span class="label-text">CV</span><span class="value ${profile.hasCV ? 'cv-yes' : 'cv-no'}">${profile.hasCV ? 'Uploaded' : 'Not uploaded'}</span></div>
        </div>` : '';

      panel.innerHTML = `
        ${current}
        <div class="profile-form">
          <div class="field">
            <label for="pf-name">Name</label>
            <input type="text" id="pf-name" value="${profile ? esc(profile.name) : ''}" placeholder="Your name">
          </div>
          <div class="field">
            <label for="pf-email">Email</label>
            <input type="email" id="pf-email" value="${profile ? esc(profile.email) : ''}" placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="pf-cv">CV (PDF)</label>
            <input type="file" id="pf-cv" accept="application/pdf">
            <div class="hint">${profile && profile.hasCV ? 'A CV is already uploaded. Leave empty to keep the current one.' : 'Upload a PDF file (max 10MB)'}</div>
          </div>
          <div class="form-actions">
            <button class="btn primary" id="btn-save-profile">${profile ? 'Update Profile' : 'Save Profile'}</button>
            ${profile ? '<button class="btn" id="btn-delete-profile">Delete</button>' : ''}
          </div>
        </div>
      `;

      $('#btn-save-profile').addEventListener('click', saveProfile);
      const delBtn = $('#btn-delete-profile');
      if (delBtn) delBtn.addEventListener('click', deleteProfile);
    }

    async function saveProfile() {
      const name = $('#pf-name').value.trim();
      const email = $('#pf-email').value.trim();
      const cvFile = $('#pf-cv').files[0];

      if (!name || !email) {
        showStatus('Name and email are required', 'error');
        return;
      }

      const fd = new FormData();
      fd.append('name', name);
      fd.append('email', email);
      if (cvFile) fd.append('cv', cvFile);

      const btn = $('#btn-save-profile');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Saving...';
      try {
        const res = await fetch('/profile', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) {
          showStatus('Profile saved', 'success');
          renderProfileForm(data);
        } else {
          showStatus(`Error: ${data.error}`, 'error');
        }
      } catch (e) {
        showStatus('Request failed.', 'error');
      }
      btn.disabled = false;
    }

    async function deleteProfile() {
      if (!confirm('Delete your profile and CV?')) return;
      try {
        await fetch('/profile', { method: 'DELETE' });
        showStatus('Profile deleted', 'success');
        renderProfileForm(null);
      } catch (e) {
        showStatus('Request failed.', 'error');
      }
    }

    // ===== Apply =====
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-apply');
      if (!btn) return;

      const jobId = btn.dataset.jobId;
      const card = btn.closest('.job-card');
      const jobUrl = card.dataset.jobUrl;
      const panel = $(`#apply-${jobId}`);

      // Toggle — if already visible with content, hide it
      if (!panel.classList.contains('hidden') && panel.dataset.state === 'done') {
        panel.classList.add('hidden');
        panel.dataset.state = '';
        panel.innerHTML = '';
        return;
      }

      // Check profile first
      const profRes = await fetch('/profile');
      if (profRes.status === 404) {
        panel.classList.remove('hidden');
        panel.innerHTML = `<div class="apply-error">No profile found. <a href="#" id="goto-profile-${jobId}" style="color:#58a6ff;">Set up your profile</a> first.</div>`;
        $(`#goto-profile-${jobId}`).addEventListener('click', (ev) => {
          ev.preventDefault();
          document.querySelector('.tab[data-panel="profile"]').click();
        });
        return;
      }
      const profile = await profRes.json();
      if (!profile.hasCV) {
        panel.classList.remove('hidden');
        panel.innerHTML = `<div class="apply-error">No CV uploaded. <a href="#" id="goto-profile-${jobId}" style="color:#58a6ff;">Upload your CV</a> first.</div>`;
        $(`#goto-profile-${jobId}`).addEventListener('click', (ev) => {
          ev.preventDefault();
          document.querySelector('.tab[data-panel="profile"]').click();
        });
        return;
      }

      // Show loading
      panel.classList.remove('hidden');
      panel.dataset.state = 'loading';
      panel.innerHTML = '<div class="loading"><span class="spinner"></span>Generating personalized cover letter via Claude... this may take up to 2 minutes.</div>';
      btn.disabled = true;

      try {
        const res = await fetch('/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jobUrl }),
        });
        const data = await res.json();

        if (!res.ok) {
          panel.innerHTML = `<div class="apply-error">Error: ${esc(data.error)}</div>`;
          panel.dataset.state = 'error';
          btn.disabled = false;
          return;
        }

        renderApplyPanel(panel, data, jobUrl, profile);
        panel.dataset.state = 'done';
      } catch (err) {
        panel.innerHTML = `<div class="apply-error">Request failed.</div>`;
        panel.dataset.state = 'error';
      }
      btn.disabled = false;
    });

    function renderApplyPanel(panel, data, jobUrl, profile) {
      const emailInfo = data.email
        ? `<div class="apply-info">Contact email: <strong>${esc(data.email)}</strong></div>`
        : `<div class="apply-info">No contact email found in posting. Use copy-to-clipboard and paste into the GitHub issue.</div>`;

      const textareaId = 'cl-' + Math.random().toString(36).slice(2, 8);

      panel.innerHTML = `
        ${emailInfo}
        <textarea id="${textareaId}">${esc(data.coverLetter)}</textarea>
        <div class="apply-actions">
          ${data.email ? `<button class="btn-sm primary" data-action="mailto">Open Email</button>` : ''}
          <button class="btn-sm" data-action="copy">Copy to Clipboard</button>
          <a class="btn-sm" href="${esc(jobUrl)}" target="_blank" style="text-decoration:none;display:inline-block;">Open Issue</a>
        </div>
      `;

      panel.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const textarea = $('#' + textareaId);
          const body = textarea.value;
          if (btn.dataset.action === 'mailto') {
            const mailto = `mailto:${encodeURIComponent(data.email)}?subject=${encodeURIComponent(data.subject)}&body=${encodeURIComponent(body)}`;
            window.location.href = mailto;
          } else if (btn.dataset.action === 'copy') {
            navigator.clipboard.writeText(body).then(() => {
              showStatus('Cover letter copied to clipboard', 'success');
            });
          }
        });
      });
    }

    function formatDate(d) {
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    // Init
    loadJobs();
    loadRepos();
  </script>
</body>
</html>
